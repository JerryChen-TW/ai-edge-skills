<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Translator v2 – Entry</title>
</head>
<body>
  <script>
    // Headless JS entry for AI Edge Gallery.
    // This file MUST only expose ai_edge_gallery_get_result and return
    // a JSON string. The actual AR UI runs in assets/webview.html.

    window['ai_edge_gallery_get_result'] = async (data) => {
      try {
        const params = data ? JSON.parse(data) : {};
        const lang = params.target_language || params.lang || 'es';

        const LANG_NAMES = {
          es: 'Spanish',
          fr: 'French',
          de: 'German',
          it: 'Italian',
          hi: 'Hindi',
        };

        const humanName = LANG_NAMES[lang] || lang;

        return JSON.stringify({
          result: `Opening AR Translator with target language set to ${humanName}. Tell the user to tap the preview card to start the AR camera.`,
          webview: {
            // Relative to the skill assets/ folder as documented in the
            // official skills README.
            url: `webview.html?lang=${encodeURIComponent(lang)}`,
            aspectRatio: 1.777 // 16:9 fullscreen-style card
          }
        });
      } catch (e) {
        console.error(e);
        return JSON.stringify({
          error: `Failed to start AR Translator: ${e.message}`
        });
      }
    };
  </script>
</body>
</html>
