<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AR Translator v2</title>
</head>
<body>
<script>
  window['ai_edge_gallery_get_result'] = async (data) => {
    try {
      const jsonData = JSON.parse(data);
      const lang = jsonData.target_language || jsonData.lang || 'es';
      const validLangs = ['es', 'fr', 'de', 'it', 'hi'];
      const targetLang = validLangs.includes(lang) ? lang : 'es';
      return JSON.stringify({
        webview: {
          iframe: true,
          url: `../assets/webview.html?lang=${targetLang}`,
        },
      });
    } catch (e) {
      console.error(e);
      return JSON.stringify({ error: `AR Translator error: ${e.message}` });
    }
  };
</script>
</body>
</html>
