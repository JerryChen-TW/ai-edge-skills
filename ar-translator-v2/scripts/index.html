        *{box-sizing:border-box;margin:0;padding:0}
        body,html{width:100%;height:100%;overflow:hidden;background:#000;font-family:system-ui,-apple-system,sans-serif}
        #video-container{position:relative;width:100%;height:100%;display:flex;justify-content:center;align-items:center}
        video{position:absolute;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;z-index:1}

<script type="module">
import { ObjectDetector, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

const video=document.getElementById('webcam');
const canvas=document.getElementById('output_canvas');
const ctx=canvas.getContext('2d');
const statusText=document.getElementById('status-text');
const startBtn=document.getElementById('start-btn');
let detector,running=false,lastTime=-1;

// Use the lang resolved at top of file (LANG is a global const)
let currentLang = window.LANG || new URLSearchParams(location.search).get('lang') || 'es';
const LANG_NAMES = {es:'Spanish',fr:'French',de:'German',it:'Italian',hi:'Hindi'};
statusText.textContent = 'Initializing...';

// Allow the App to change language after init
window.__setLang = (l) => { currentLang = l; };

const MODEL = 'https://jerrychen-tw.github.io/ai-edge-skills/ar-translator-v2/assets/efficientdet_lite2.tflite';
const WASM  = 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm';

async function init() {
  statusText.textContent = 'Step 1/3: Loading WASM runtime...';
  const vision = await FilesetResolver.forVisionTasks(WASM);
  statusText.textContent = 'Step 2/3: Loading model (GPU)...';
  try {
    detector = await ObjectDetector.createFromOptions(vision, { baseOptions:{modelAssetPath:MODEL,delegate:'GPU'}, scoreThreshold:0.5, runningMode:'VIDEO' });
    statusText.textContent = '\u2713 Ready (GPU)! ' + (LANG_NAMES[currentLang]||currentLang);
  } catch(e) {
    console.warn('GPU failed:', e);
    statusText.textContent = 'Step 3/3: Falling back to CPU...';
    detector = await ObjectDetector.createFromOptions(vision, { baseOptions:{modelAssetPath:MODEL,delegate:'CPU'}, scoreThreshold:0.5, runningMode:'VIDEO' });
    statusText.textContent = '\u2713 Ready (CPU)! ' + (LANG_NAMES[currentLang]||currentLang);
  }
  startBtn.style.display = 'block';
}

startBtn.addEventListener('click', () => {
  if (!detector) return;
  startBtn.style.display = 'none';
  statusText.textContent = 'Starting camera...';
  navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' } })
    .then(stream => {
      video.srcObject = stream;
      video.addEventListener('loadeddata', () => { running=true; loop(); });
    })
    .catch(err => { statusText.textContent = 'Camera denied: '+err.message; startBtn.style.display='block'; });
});

async function loop() {
  if (!running) return;
  if (video.currentTime !== lastTime) {
    lastTime = video.currentTime;
    draw(detector.detectForVideo(video, performance.now()));
  }
  requestAnimationFrame(loop);
}

function draw(result) {
  const W=window.innerWidth, H=window.innerHeight;
  if(canvas.width!==W||canvas.height!==H){canvas.width=W;canvas.height=H;}
  ctx.clearRect(0,0,W,H);
  if(!video.videoWidth||!video.videoHeight)return;
  const vr=video.videoWidth/video.videoHeight, dr=W/H;
  let dw,dh,sx,sy;
  if(dr>vr){dh=H;dw=H*vr;sx=(W-dw)/2;sy=0;}else{dw=W;dh=W/vr;sx=0;sy=(H-dh)/2;}
  ctx.drawImage(video,sx,sy,dw,dh);
  const sc=dw/video.videoWidth;
  for(const det of result.detections){
    const rb=det.boundingBox;
    const b={x:rb.originX*sc+sx, y:rb.originY*sc+sy, w:rb.width*sc, h:rb.height*sc};
    const cat=det.categories[0];
    const en=cat.categoryName;
    const DICT_REF = window.DICT || {};
    const d = DICT_REF[en.toLowerCase()];
    const tr = (d && d[currentLang]) ? d[currentLang] : en.charAt(0).toUpperCase()+en.slice(1);
    const pct=Math.round(cat.score*100);
    const cl=30;
    ctx.lineWidth=4;ctx.strokeStyle='#10B981';ctx.shadowColor='#34D399';ctx.shadowBlur=15;
    ctx.beginPath();
    ctx.moveTo(b.x,b.y+cl);ctx.lineTo(b.x,b.y);ctx.lineTo(b.x+cl,b.y);
    ctx.moveTo(b.x+b.w-cl,b.y);ctx.lineTo(b.x+b.w,b.y);ctx.lineTo(b.x+b.w,b.y+cl);
    ctx.moveTo(b.x,b.y+b.h-cl);ctx.lineTo(b.x,b.y+b.h);ctx.lineTo(b.x+cl,b.y+b.h);
    ctx.moveTo(b.x+b.w-cl,b.y+b.h);ctx.lineTo(b.x+b.w,b.y+b.h);ctx.lineTo(b.x+b.w,b.y+b.h-cl);
    ctx.stroke();ctx.shadowBlur=0;
    const tw=ctx.measureText(tr).width,pad=16,ch=65,cy=b.y-ch-10;
    ctx.font='bold 28px system-ui,sans-serif';
    ctx.fillStyle='rgba(15,23,42,0.85)';
    ctx.beginPath();ctx.roundRect(b.x,cy,Math.max(tw+pad*2,180),ch,12);ctx.fill();
    ctx.lineWidth=2;ctx.strokeStyle='rgba(16,185,129,0.6)';ctx.stroke();
    ctx.fillStyle='#FFF';ctx.fillText(tr,b.x+pad,cy+30);
    ctx.font='16px system-ui,sans-serif';ctx.fillStyle='#94A3B8';
    ctx.fillText(en.toUpperCase()+' \u2022 '+pct+'%',b.x+pad,cy+52);
  }
}

init().catch(e => { statusText.textContent = '\u274c '+e.message; });
</script>
