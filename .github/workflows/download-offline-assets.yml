name: Download Offline Assets for ar-translator-v2

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/download-offline-assets.yml'

jobs:
  download-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download MediaPipe WASM files
        run: |
          mkdir -p ar-translator-v2/assets/wasm
          BASE="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
          curl -L "$BASE/vision_wasm_internal.js" -o ar-translator-v2/assets/wasm/vision_wasm_internal.js
          curl -L "$BASE/vision_wasm_internal.wasm" -o ar-translator-v2/assets/wasm/vision_wasm_internal.wasm
          curl -L "$BASE/vision_wasm_nosimd_internal.js" -o ar-translator-v2/assets/wasm/vision_wasm_nosimd_internal.js
          curl -L "$BASE/vision_wasm_nosimd_internal.wasm" -o ar-translator-v2/assets/wasm/vision_wasm_nosimd_internal.wasm
          echo "WASM files downloaded:"
          ls -lh ar-translator-v2/assets/wasm/

      - name: Download EfficientDet-Lite2 model
        run: |
          curl -L "https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite2/float16/1/efficientdet_lite2.tflite" \
            -o ar-translator-v2/assets/efficientdet_lite2.tflite
          echo "Model downloaded:"
          ls -lh ar-translator-v2/assets/efficientdet_lite2.tflite

      - name: Update webview.html to use local paths
        run: |
          sed -i 's|https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm|./assets/wasm|g' \
            ar-translator-v2/assets/webview.html
          sed -i 's|https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite2/float16/1/efficientdet_lite2.tflite|./assets/efficientdet_lite2.tflite|g' \
            ar-translator-v2/assets/webview.html
          echo "webview.html updated:"
          grep -n 'modelAssetPath\|forVisionTasks' ar-translator-v2/assets/webview.html

      - name: Commit and push assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ar-translator-v2/assets/
          git diff --cached --stat
          git commit -m "Add offline WASM + EfficientDet-Lite2 model assets [skip ci]" || echo "Nothing to commit"
          git push
